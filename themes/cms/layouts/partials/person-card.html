{{- $person := .person -}}
<a href="{{ $person.RelPermalink }}" class="person-card">
  <div class="person-photo">
    {{ if $person.Params.image }}
    <img src="{{ (strings.TrimPrefix "/" $person.Params.image) | relURL }}" alt="{{ $person.Title }}">
    {{ else }}
    <div class="person-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    {{ end }}
  </div>
  <h3 class="person-name">{{ $person.Title }}</h3>
  {{ with $person.Params.role }}<p class="person-role">{{ . }}</p>{{ end }}
</a>
